<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Central - Login</title>
    <link rel="stylesheet" href="colorines.css">
    <style>
    
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #0f172a;
        }
        .registro-link {
            margin-top: 20px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .registro-link a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }
        .registro-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2 style="color: white; text-align: center; margin-bottom: 25px;">ACCESO PANEL CITAS</h2>
        
        <div class="input-group">
            <label for="usuario" style="color: #38bdf8;">Usuario:</label>
            <input type="text" id="usuario" placeholder="Introduce tu usuario">
        </div>

        <div class="input-group">
            <label for="password" style="color: #38bdf8;">Contraseña:</label>
            <input type="password" id="password" placeholder="********">
        </div>

        <button onclick="login()" class="btn-primary" style="width: 100%; margin-top: 10px;">
            ENTRAR AL PANEL
        </button>

        <div class="registro-link">
            ¿No tienes una cuenta? <br>
            <a href="registro.html">CREAR CUENTA NUEVA</a>
        </div>
    </div>

    <script>
        function login() {
            const user = document.getElementById('usuario').value;
            const pass = document.getElementById('password').value;

            if (!user || !pass) {
                alert("Por favor, rellena todos los campos.");
                return;
            }

            const datos = {
                usuario: user,
                password: pass
            };

            fetch('http://127.0.0.1:5000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            })
            .then(res => {
                if (res.ok) return res.json();
                throw new Error("Credenciales incorrectas");
            })
            .then(data => {
                if (data.autorizado) {
                    
                    localStorage.setItem('logeado', 'true');
                    localStorage.setItem('nombreUsuario', user);
                    
                    
                    window.location.href = "index.html";
                }
            })
            .catch(err => {
                alert("Error: Usuario o contraseña no válidos.");
                console.error(err);
            });
        }

        
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>

</body>
</html>
